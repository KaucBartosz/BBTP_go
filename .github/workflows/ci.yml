name: Build Native Go Tests

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request: {}
  workflow_dispatch: {}

jobs:
  build-native:
    name: ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: .exe
            artifact: windows-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            artifact: linux-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
            artifact: darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum

      - name: Install Linux dependencies (amd64)
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglfw3-dev libgl1-mesa-dev \
            libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev \
            libxxf86vm-dev

      - name: Build all tests
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go env GOOS GOARCH CGO_ENABLED
          TESTS="bystreOczko corsi fabrykaFigur goNoGo goNoGoBiegacze nwstecz pingPong samochodzik semafor stop stroop sygnalizacja zlapSygnal"
          for test in $TESTS; do
            echo "Building $test..."
            mkdir -p "${{ runner.temp }}/pack/$test"
            go build -o "${{ runner.temp }}/pack/$test/$test${{ matrix.ext }}" "./cmd/$test"
          done

      - name: Package tests
        shell: bash
        run: |
          TESTS="bystreOczko corsi fabrykaFigur goNoGo goNoGoBiegacze nwstecz pingPong samochodzik semafor stop stroop sygnalizacja zlapSygnal"
          EXT="${{ matrix.ext }}"
          ARTIFACT="${{ matrix.artifact }}"
          for test in $TESTS; do
            testDir="${{ runner.temp }}/pack/$test"
            mkdir -p "$testDir"
            export TEST="$test"
            export TEST_DIR="$testDir"
            export TEST_EXT="$EXT"
            export TEST_ARTIFACT="$ARTIFACT"
            export PACK_DIR="${{ runner.temp }}/pack"
            export META_FILE="${{ github.workspace }}/tests-metadata.json"
            python "${{ github.workspace }}/ci/package-tests.py"
          done
          cp "${{ github.workspace }}/tests-metadata.json" "${{ runner.temp }}/pack/tests-metadata.json"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nous-tests-${{ matrix.artifact }}
          path: ${{ runner.temp }}/pack/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-native]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/artifacts

      - name: Collect per-test files and create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p ${{ runner.temp }}/release
          find ${{ runner.temp }}/artifacts \( -name '*.zip' -o -name '*.txt' \) -type f | while read f; do
            cp "$f" "${{ runner.temp }}/release/"
          done
          TAG=${GITHUB_REF#refs/tags/}
          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "BBTP_go $TAG" \
            --notes "Zbudowano: $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            ${{ runner.temp }}/release/*.zip \
            ${{ runner.temp }}/release/*.txt