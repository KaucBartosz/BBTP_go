name: Build Native Go Tests

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request: {}
  workflow_dispatch: {}

jobs:
  build-native:
    name: ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: .exe
            artifact: windows-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            artifact: linux-amd64
          - os: macos-13
            goos: darwin
            goarch: amd64
            ext: ""
            artifact: darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
            artifact: darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum

      - name: Install Linux dependencies (amd64)
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglfw3-dev libgl1-mesa-dev \
            libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev

      - name: Build all tests
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          TESTS="bystreOczko corsi fabrykaFigur goNoGo goNoGoBiegacze nwstecz pingPong samochodzik semafor stop stroop sygnalizacja zlapSygnal"
          for test in $TESTS; do
            mkdir -p "${{ runner.temp }}/pack/$test"
            go build -o "${{ runner.temp }}/pack/$test/$test${{ matrix.ext }}" "./cmd/$test"
          done

      - name: Package tests
        shell: bash
        run: |
          TESTS="bystreOczko corsi fabrykaFigur goNoGo goNoGoBiegacze nwstecz pingPong samochodzik semafor stop stroop sygnalizacja zlapSygnal"
          EXT="${{ matrix.ext }}"
          ARTIFACT="${{ matrix.artifact }}"

          for test in $TESTS; do
            testDir="${{ runner.temp }}/pack/$test"
            mkdir -p "$testDir"

            export TEST="$test"
            export TEST_DIR="$testDir"
            export TEST_EXT="$EXT"
            export TEST_ARTIFACT="$ARTIFACT"
            export PACK_DIR="${{ runner.temp }}/pack"
            export META_FILE="${{ github.workspace }}/tests-metadata.json"

            python3 << 'PYEOF'
import json, os, pathlib, zipfile
from datetime import datetime

test = os.environ['TEST']
test_dir = os.environ['TEST_DIR']
ext = os.environ['TEST_EXT']
artifact = os.environ['TEST_ARTIFACT']
pack_dir = os.environ['PACK_DIR']
meta_file = os.environ['META_FILE']

data = json.load(open(meta_file, encoding='utf-8'))
meta = data.get(test, {})
name = meta.get('name', test)
desc = meta.get('description', 'Brak opisu')
timestamp = datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')

out = {'name': name, 'version': 1, 'description': desc, 'lastUpdated': timestamp, 'nativeBinary': True}
json.dump(out, open(os.path.join(test_dir, 'meta.json'), 'w'), indent=2, ensure_ascii=False)

pathlib.Path(os.path.join(pack_dir, f'{test}.txt')).write_text(desc, encoding='utf-8')

src = os.path.join(test_dir, f'{test}{ext}')
dst = os.path.join(pack_dir, f'{test}-{artifact}.zip')
with zipfile.ZipFile(dst, 'w', zipfile.ZIP_DEFLATED) as zf:
    zf.write(src, os.path.basename(src))
PYEOF
          done

          cp "${{ github.workspace }}/tests-metadata.json" "${{ runner.temp }}/pack/tests-metadata.json"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nous-tests-${{ matrix.artifact }}
          path: ${{ runner.temp }}/pack/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-native]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/artifacts

      - name: Collect per-test files and create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p ${{ runner.temp }}/release
          find ${{ runner.temp }}/artifacts \( -name '*.zip' -o -name '*.txt' \) -type f | while read f; do
            cp "$f" "${{ runner.temp }}/release/"
          done

          TAG=${GITHUB_REF#refs/tags/}
          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "BBTP_go $TAG" \
            --notes "Zbudowano: $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            ${{ runner.temp }}/release/*.zip \
            ${{ runner.temp }}/release/*.txt